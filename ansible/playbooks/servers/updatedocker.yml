- name: Pull latest Docker containers
  hosts: 192.168.21.11
  tasks:
    - name: Pull latest Docker image
      docker_image:
        name: binhex/arch-qbittorrentvpn
        source: pull
        state: present
        force_source: yes
    - name: Restart Docker container
      docker_container:
        name: binhex/arch-qbittorrentvpn
        state: started
        restart: yes
        image: binhex/arch-qbittorrentvpn     
